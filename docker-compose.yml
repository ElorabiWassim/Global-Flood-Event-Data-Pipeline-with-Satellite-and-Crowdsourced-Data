services:
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flood-db-init
    env_file:
      - .env
    command: ["python", "scripts/init_db.py"]
    volumes:
      - ./:/app

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flood-api
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      db-init:
        condition: service_completed_successfully

  emdat-ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emdat-ingestion
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: ["python", "-m", "ingestion.emdat"]
    volumes:
      - ./:/app
    depends_on:
      db-init:
        condition: service_completed_successfully

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-init
    user: "50000:0"
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      PYTHONPATH: /opt/airflow/project
    command: ["bash", "-lc", "airflow db migrate && (airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true)"]
    volumes:
      - airflow_home:/opt/airflow
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    depends_on:
      db-init:
        condition: service_completed_successfully

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-webserver
    user: "50000:0"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      PYTHONPATH: /opt/airflow/project
    command: ["airflow", "webserver"]
    ports:
      - "8080:8080"
    volumes:
      - airflow_home:/opt/airflow
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-scheduler
    user: "50000:0"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      PYTHONPATH: /opt/airflow/project
    command: ["airflow", "scheduler"]
    volumes:
      - airflow_home:/opt/airflow
      - ./:/opt/airflow/project
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_home:
