
services:
  airflow:
    # Custom image bakes pandas / SQLAlchemy / h3 / dbt-core into the image
    # so container startup is fast and reproducible. See airflow/Dockerfile.
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: flood-pipeline-airflow:2.9.3
    container_name: flood_airflow
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Tell the DAG where the project root is mounted inside the container.
      FLOOD_PIPELINE_ROOT: /opt/airflow
    volumes:
      # Airflow runtime state (logs + plugins). DAGs live at root ./dags.
      - ./dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      # Mount each source package so the DAG can import them as top-level
      # modules (resolved via FLOOD_PIPELINE_ROOT=/opt/airflow on sys.path).
      - ./config:/opt/airflow/config:ro
      - ./db:/opt/airflow/db:ro
      - ./ingestion:/opt/airflow/ingestion:ro
      - ./transformations:/opt/airflow/transformations:ro
      - ./validation:/opt/airflow/validation:ro
      # dbt project: read-only models + writable target/ + run logs.
      - ./dbt:/opt/airflow/dbt
      - ./data:/opt/airflow/data
      - ./.env:/opt/airflow/.env:ro
    ports:
      - "8081:8080"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true &&
      airflow standalone
      "

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: flood_api
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      # Live-reload friendly: bind-mount sources during development. Comment
      # out for a fully-baked production image. The API only needs ``config``
      # and ``db`` to query marts — no ingestion / transformation code.
      - ./config:/app/config:ro
      - ./db:/app/db:ro
      - ./api:/app/api:ro
    ports:
      - "8000:8000"
    depends_on:
      - airflow
    restart: unless-stopped
